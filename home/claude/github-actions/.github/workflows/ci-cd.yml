name: CI/CD Monorepo

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Détection des changements — évite de tout rebuilder
  # ──────────────────────────────────────────────────────────────
  changes:
    name: 🔎 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci-cd.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci-cd.yml'

  # ──────────────────────────────────────────────────────────────
  # BACKEND
  # ──────────────────────────────────────────────────────────────
  backend-quality:
    name: 🔧 Backend — TypeScript
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm install
      - run: npx tsc --noEmit

  backend-docker:
    name: 🐳 Backend — Docker Build
    runs-on: ubuntu-latest
    needs: backend-quality

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: chat-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  backend-deploy:
    name: 🚀 Backend — Deploy Render
    runs-on: ubuntu-latest
    needs: backend-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production-backend
      url: ${{ vars.RENDER_BACKEND_URL }}

    steps:
      - name: 🚀 Trigger Render Deploy
        run: |
          curl --fail-with-body -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            -d '{"clearCache": false}'

      - name: ⏳ Wait for deployment
        run: |
          MAX_RETRIES=30
          RETRY=0
          while [ $RETRY -lt $MAX_RETRIES ]; do
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys?limit=1" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['deploy']['status'])" 2>/dev/null || echo "unknown")
            echo "Deploy status: $STATUS ($((RETRY+1))/$MAX_RETRIES)"
            if [ "$STATUS" = "live" ]; then echo "✅ Deployed!" && exit 0; fi
            if [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "canceled" ]; then echo "❌ Failed" && exit 1; fi
            RETRY=$((RETRY+1))
            sleep 10
          done
          echo "⚠️ Timeout" && exit 1

      - name: 🏥 Health check
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.RENDER_BACKEND_URL }}/api/v1/auth/me")
          [ "$CODE" = "401" ] && echo "✅ Backend live" || echo "⚠️ Got $CODE"

  # ──────────────────────────────────────────────────────────────
  # FRONTEND
  # ──────────────────────────────────────────────────────────────
  frontend-quality:
    name: 🎨 Frontend — TypeScript & Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm run lint

  frontend-build:
    name: 🏗️ Frontend — Vite Build
    runs-on: ubuntu-latest
    needs: frontend-quality
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - name: 🏗️ Build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_WS_URL: ${{ vars.VITE_WS_URL }}
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

  frontend-deploy:
    name: 🚀 Frontend — Deploy Vercel
    runs-on: ubuntu-latest
    needs: frontend-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production-frontend
      url: ${{ vars.VERCEL_FRONTEND_URL }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm install -g vercel@latest
      - run: cd frontend && vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: cd frontend && vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - id: deploy
        run: |
          URL=$(cd frontend && vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
      - name: 🏥 Health check
        run: |
          sleep 10
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}")
          [ "$CODE" = "200" ] && echo "✅ Frontend live" || echo "⚠️ Got $CODE"

  frontend-preview:
    name: 👁️ Frontend — PR Preview
    runs-on: ubuntu-latest
    needs: frontend-build
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm install -g vercel@latest
      - run: cd frontend && vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - run: cd frontend && vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - id: preview
        run: |
          URL=$(cd frontend && vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 👁️ Preview déployée\n**URL :** ${{ steps.preview.outputs.url }}\n> Commit \`${{ github.sha }}\``
            });

  # ──────────────────────────────────────────────────────────────
  # Résumé global
  # ──────────────────────────────────────────────────────────────
  summary:
    name: 📊 Summary
    runs-on: ubuntu-latest
    needs: [backend-deploy, frontend-deploy]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: 📊 Write summary
        run: |
          echo "# 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service  | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend (Render) | ${{ needs.backend-deploy.result == 'success' && '✅ Live' || needs.backend-deploy.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (Vercel)| ${{ needs.frontend-deploy.result == 'success' && '✅ Live' || needs.frontend-deploy.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit :** \`${{ github.sha }}\` | **Author :** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
